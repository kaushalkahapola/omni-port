# Patch configuration for shadow runs and evaluation
# This file defines all patches to test, supporting any repo, type, and count
#
# Structure:
#   repos:
#     <repo_name>:
#       path: <local_path_to_cloned_repo>
#       patches:
#         - type: TYPE-I (or TYPE-II, TYPE-III, TYPE-IV, TYPE-V, CUSTOM, etc.)
#           original_commit: <commit_sha>
#           backport_commit: <commit_sha>
#           description: (optional) human-readable description
#
# Usage:
#   python run_full_pipeline_shadow.py --config patches.yaml
#   python run_full_pipeline_shadow.py --config patches.yaml --repo elasticsearch --type TYPE-I
#   python run_full_pipeline_shadow.py --config patches.yaml --count 10

repos:
  elasticsearch:
    path: repos/elasticsearch
    patches:
      - type: TYPE-I
        original_commit: da51c8ccbf0171abefb2978810efd6db0f6f743e
        backport_commit: b25542fd147164cd0e89a803bbe49f865972abdb
        description: "Simple transport protocol refactor - high confidence git match"

